name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:           # allows manual run

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Pac-Man Graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Adityakumar0008
          outputs: |
            dist/pacman-contribution-graph.svg?game=pacman
            dist/pacman-contribution-graph-dark.svg?game=pacman&color_snake=yellow&color_dot[]=010101&color_dot[]=0d4429&color_dot[]=006d32&color_dot[]=26a641&color_dot[]=39d353

      - name: Push to pacman-output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
